<div class="vehicle-card">
    <span class="badge">{{vehicle().brand}}</span>
    <img [src]="vehicle().image" alt="">
    <div class="card-body">
        <h3>{{vehicle().model}}</h3>

        <div class="card-stats">
            <div class="stat">
                <!-- people -->
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3z"/><path d="M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3z"/><path d="M8 13c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13z"/><path d="M16 13c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                <span>{{vehicle().seats}} places</span>
            </div>

            <div class="stat">
                <!-- gear -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 2v20M12 12l4-4M12 12l-4 4"/>
                    <circle cx="12" cy="12" r="10"/>
                </svg>
                <span>{{vehicle().transmission}}</span>
            </div>

            <div class="stat">
                <!-- speed -->
                <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9"/><path d="M12 12l4-4"/></svg>
                <span>585 ch</span>
            </div>
        </div>

        <div class="card-footer">
            <div class="price">
                <strong>{{vehicle().pricePerDays}}€</strong>
                <span>/jour</span>
            </div>
            <a href="/vehicle/1" class="details-btn">Détails →</a>
        </div>
    </div>
</div>
