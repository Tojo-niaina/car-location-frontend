<div class="auth-wrapper">

    <div class="auth-header">
        <img src="/assets/img/Logo.png" alt="Locaz Rentable" class="logo">
        <h1>Rejoignez <span>Locaz Rentable</span></h1>
        <p>Créez votre compte pour accéder à nos véhicules d’exception</p>
    </div>

    <div class="auth-card">
        <form>

            <div class="grid-2">
                <div class="field">
                    <label>Prénom</label>
                    <input type="text" placeholder="Jean">
                </div>

                <div class="field">
                    <label>Nom</label>
                    <input type="text" placeholder="Dupont">
                </div>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com">
            </div>

            <div class="field">
                <label>Téléphone</label>
                <input type="tel" placeholder="+33 6 12 34 56 78">
            </div>

            <div class="grid-2">
                <div class="field">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••">
                </div>

                <div class="field">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" placeholder="••••••••">
                </div>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="terms">
                <label for="terms">
                    J'accepte les <a href="#">conditions générales d'utilisation</a> et la
                    <a href="#">politique de confidentialité</a>
                </label>
            </div>

            <button class="btn-gold">
                Créer mon compte →
            </button>

            <div class="footer-text">
                Déjà un compte ? <a href="/login">Se connecter</a>
            </div>

        </form>
    </div>

</div>
