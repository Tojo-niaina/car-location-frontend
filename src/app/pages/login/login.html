<div class="login-wrapper">

    <div class="logo-image">
        <img src="/assets/img/Logo.png" alt="Locaz Rentable">
    </div>    

    <h1>Bon retour sur <span>LocazRentable</span></h1>
    <p>Connectez-vous à votre compte</p>

    <div class="login-card" [formGroup]="loginFormGroup">
        <div class="field">
            <label>Email</label>
            <div class="input-wrapper">
                <!-- Mail -->
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                    <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
                    <path d="M22 6l-10 7L2 6"/>
                </svg>
                <input type="email" placeholder="votre@email.com" formControlName="email">
            </div>
        </div>

        <div class="field">
            <label>Mot de passe</label>
            <div class="input-wrapper">
                <!-- Lock -->
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                    <rect x="3" y="11" width="18" height="10" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" placeholder="••••••••" formControlName="password">
            </div>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Se souvenir de moi
            </label>
            <a href="#">Mot de passe oublié ?</a>
        </div>

        <button class="login-btn" (click)="login()">
            Se connecter →
        </button>

        <div class="divider">OU</div>

        <div class="register">
            Pas encore de compte ? <a href="/subscribe">Créer un compte</a>
        </div>

    </div>
</div>
